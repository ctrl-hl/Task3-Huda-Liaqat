<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWT Auth</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="layout">
    <header>
      <h1>JWT Auth</h1>
      <p>Minimal client for the REST API</p>
      <div id="health-pill" class="health-pill">
        <span class="dot"></span>
        <span id="health-label">Checking…</span>
      </div>
    </header>

    <section id="auth-panel" class="card">
      <h2>Account</h2>
      <div class="tabs">
        <button type="button" class="tab active" data-tab="login">Login</button>
        <button type="button" class="tab" data-tab="register">Register</button>
      </div>

      <div id="auth-message" class="message hidden"></div>

      <form id="login-form">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="email" required />

        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
      </form>

      <form id="register-form" class="hidden">
        <label for="reg-username">Username</label>
        <input id="reg-username" type="text" autocomplete="username" required />

        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" autocomplete="email" required />

        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" autocomplete="new-password" required />

        <button type="submit">Create account</button>
      </form>
    </section>

    <section id="profile-panel" class="hidden">
      <div class="card">
        <h2>Profile</h2>
        <div class="profile-row"><span>Username</span><span id="pf-username">—</span></div>
        <div class="profile-row"><span>Email</span><span id="pf-email">—</span></div>
        <div class="profile-row"><span>Joined</span><span id="pf-created">—</span></div>
      </div>

      <div class="card">
        <h2>Update</h2>
        <div id="profile-message" class="message hidden"></div>
        <form id="profile-form">
          <label for="edit-username">New username</label>
          <input id="edit-username" type="text" placeholder="Leave blank to skip" />

          <label for="edit-email">New email</label>
          <input id="edit-email" type="email" placeholder="Leave blank to skip" />

          <button type="submit">Save changes</button>
        </form>
        <button type="button" id="refresh-btn" class="btn btn-ghost">Refresh token</button>
        <button type="button" id="logout-btn" class="btn btn-ghost">Log out</button>
      </div>
    </section>

    <footer>Cool slate · cyan accents</footer>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
